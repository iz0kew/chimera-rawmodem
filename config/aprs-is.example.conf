# chimera-rawmodem — APRS-IS credentials TEMPLATE
#
# Copy to aprs-is.conf, fill in YOUR OWN data, place in /etc/chimera/.
# aprs-is.conf (the real copy) is gitignored — NEVER commit it: callsign,
# passcode and locator are personally identifying and location-revealing.
#
# Format: one "key value" pair per line, '#' starts a comment.

# Your callsign (optionally with SSID) for the APRS-IS login.
callsign N0CALL

# APRS-IS passcode for the callsign above. -1 = receive-only login
# (no valid passcode; packets you send will not be accepted by the server).
passcode -1

# Maidenhead locator — placeholder, reserved for a future beacon feature.
# JJ00aa is deliberately fake (0°N 0°E); set your own if/when beaconing.
locator JJ00aa

# Optional free-text comment for a future beacon feature.
comment chimera-rawmodem iGate
